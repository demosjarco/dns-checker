name: Publish

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/publish.yml'
      - 'adapters/**'
      - 'db/**'
      - 'do/**'
      - 'public/**'
      - 'src/**'
      - '*.config.*js'
      - '*.config.*ts'
      - 'wrangler.jsonc'
      - 'package*.json'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref_name }}
      url: https://dns.demosjarco.dev
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          disable-sudo-and-containers: true
          egress-policy: audit # TODO: change to 'egress-policy: block' after couple of runs
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
          check-latest: true
          cache: 'npm'
      - run: npm ci --ignore-scripts
      - run: npm run-script install --if-present
      # - name: Restore TS cache
      #   uses: actions/cache/restore@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
      #   with:
      #     path: |
      #       .tsbuildinfo
      #     key: tsc-${{ hashFiles('**/*.tsbuildinfo', '**/package-lock.json') }}
      #     restore-keys: |
      #       tsc-
      #     enableCrossOsArchive: true
      # - name: Restore server cache
      #   uses: actions/cache/restore@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
      #   with:
      #     path: |
      #       server/**
      #     key: qwik-s-${{ hashFiles('**/*.tsbuildinfo', '**/package-lock.json') }}
      #     restore-keys: |
      #       qwik-s-
      #     enableCrossOsArchive: true
      - run: npm run build.types
      # - name: Save TS cache
      #   uses: actions/cache/save@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
      #   with:
      #     path: |
      #       .tsbuildinfo
      #     key: tsc-${{ hashFiles('**/*.tsbuildinfo', '**/package-lock.json') }}
      #     enableCrossOsArchive: true
      # - name: Restore client cache
      #   uses: actions/cache/restore@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
      #   with:
      #     path: |
      #       dist/**
      #     key: qwik-c-${{ hashFiles('src/**', '**/*.tsbuildinfo', '**/package-lock.json') }}
      #     enableCrossOsArchive: true
      - run: npm run build.client
        env:
          PUBLIC_GIT_HASH: ${{ github.sha }}
      # - name: Save client cache
      #   uses: actions/cache/save@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
      #   with:
      #     path: |
      #       dist/**
      #     key: qwik-c-${{ hashFiles('src/**', '**/*.tsbuildinfo', '**/package-lock.json') }}
      #     enableCrossOsArchive: true
      - run: npm run build.server
      # - name: Save server cache
      #   uses: actions/cache/save@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
      #   with:
      #     path: |
      #       server/**
      #     key: qwik-s-${{ hashFiles('src/**', '**/*.tsbuildinfo', '**/package-lock.json') }}
      #     enableCrossOsArchive: true
      # Qwik build nukes `dist` folder. Restore back
      - run: git restore --source=HEAD --worktree --staged -- "dist/api/"
      - run: git restore --source=HEAD --worktree --staged -- "dist/dns.cf-apig.openapi.json"
      - run: git restore --source=HEAD --worktree --staged -- "dist/llms.txt"
      - run: git restore --source=HEAD --worktree --staged -- "dist/openapi.json"
      - run: git restore --source=HEAD --worktree --staged -- "dist/openapi31.json"
      - run: npm run lint
      - run: echo "wrangler_version=$(npm ls wrangler --depth=0 --json | jq -r '.dependencies.wrangler.version')" >> $GITHUB_OUTPUT
        id: npm_wrangler_version
      - uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        id: wrangler
        with:
          wranglerVersion: ${{ steps.npm_wrangler_version.outputs.wrangler_version }}
          apiToken: ${{ secrets.WORKER_DEPLOY_CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          vars: |
            GIT_HASH
            CF_ACCOUNT_ID
          secrets: |
            CF_API_TOKEN
        env:
          GIT_HASH: ${{ github.sha }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
